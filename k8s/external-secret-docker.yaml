apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-creds
  namespace: my-app
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-cluster-secret-store
    kind: ClusterSecretStore

  target:
    name: docker-creds
    creationPolicy: Owner
    template:
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "https://index.docker.io/v1/": {
                  "username": "{{ .docker_username | trim }}",
                  "password": "{{ .docker_password | trim }}",
                  "auth": "{{ printf "%s:%s" (.docker_username | trim) (.docker_password | trim) | b64enc }}"
                }
              }
            }
  data:
    - secretKey: docker_username
      remoteRef:
        key: apps/docker-creds
        property: docker_username

    - secretKey: docker_password
      remoteRef:
        key: apps/docker-creds
        property: docker_password
